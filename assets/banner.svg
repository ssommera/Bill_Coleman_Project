<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d4f5;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="6" height="200" fill="#4a90d9" rx="3"/>

  <!-- EKG / pulse line decorative -->
  <polyline points="680,100 700,100 710,60 720,140 730,80 740,120 750,100 900,100"
    fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Lung icon (simple outline) -->
  <g transform="translate(820, 50)" opacity="0.12">
    <path d="M20,0 C20,0 10,10 8,30 C6,50 0,55 0,70 C0,85 8,90 15,85 C15,85 18,75 20,60 C22,75 25,85 25,85 C32,90 40,85 40,70 C40,55 34,50 32,30 C30,10 20,0 20,0 Z" fill="#4a90d9"/>
  </g>

  <!-- Main title -->
  <text x="50" y="80" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#1a1a2e" letter-spacing="1">The Bill Coleman Project</text>

  <!-- Subtitle -->
  <text x="52" y="112" font-family="Arial, sans-serif" font-size="15" fill="#555" letter-spacing="0.5">AI-Powered Early Detection of Small Cell Lung Cancer</text>

  <!-- Second subtitle line -->
  <text x="52" y="133" font-family="Arial, sans-serif" font-size="15" fill="#555" letter-spacing="0.5">+ Immunotherapy Pulmonary Toxicity Prediction</text>

  <!-- Divider line -->
  <line x1="50" y1="150" x2="620" y2="150" stroke="#4a90d9" stroke-width="1" opacity="0.4"/>

  <!-- Dedication line -->
  <text x="52" y="172" font-family="Georgia, serif" font-size="13" fill="#888" font-style="italic">For Bill J. Coleman — October 5, 1965 — April 10, 2026</text>
</svg>
